<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss AI Assistant - AI Clothing Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Boss Panel</div>
        <div class="nav-links">
            <a href="boss-dashboard.html">Dashboard</a>
            <a href="boss-analytics.html">Analytics</a>
            <a href="boss-ai.html" style="color: var(--primary);">AI Assistant</a>
            <button id="logout-btn" class="btn btn-danger" style="padding: 0.5rem 1rem;">Logout</button>
        </div>
    </nav>

    <div class="chat-container">
        <div class="chat-box" id="boss-chat-box">
            <div class="chat-message message-ai">
                Assalomu alaykum, Boss! Biznesingiz haqida qanday ma'lumot kerak?
            </div>
        </div>
        <form class="chat-input-container" id="boss-chat-form">
            <input type="text" id="boss-chat-input" class="form-control" placeholder="Savolingizni yozing (masalan, Eng ko'p sotilgan mahsulot qaysi?)" required autocomplete="off">
            <button type="submit" class="btn btn-primary" id="boss-send-btn">Yuborish</button>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/boss.js"></script>
</body>
</html>
