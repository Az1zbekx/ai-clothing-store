<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clothing Store</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>AI Clothing Store</h1>
            <p>AI Powered Fashion Assistant</p>
        </header>

        <div class="chat-container">

            <div id="chat-box" class="chat-box">

                <div class="ai-message">
                    👋 Salom! Qanday kiyim qidiryapsiz?
                </div>

            </div>

            <div class="input-area">

                <input
                    type="text"
                    id="message-input"
                    placeholder="Menga oq futbolka kerak..."
                >

                <button id="send-btn">
                    Send
                </button>

            </div>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>
</html>
